name: codex-review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (leave empty for PR event)"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: ${{ secrets.OPENAI_API_KEY != "" }}
    name: Codex PR review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.inputs.pr_number || github.event.pull_request.number }}"
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number provided. This workflow requires either:"
            echo "  - A pull_request event, or"
            echo "  - A pr_number input via workflow_dispatch"
            exit 0
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

      - name: Collect diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="$PR_NUMBER"
          gh pr diff "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            | head -c 51200 > /tmp/pr.diff

      - name: Sanitize diff (strip secrets-like patterns before AI review)
        run: |
          python3 -c "
          import re, pathlib
          diff = pathlib.Path('/tmp/pr.diff').read_text(errors='replace')
          patterns = [
              (r'(?i)(api[_-]?key|secret|token|password|auth[_-]?token|access[_-]?key)\s*[:=]\s*[\"'\''']?[A-Za-z0-9+/=_\-.]{8,}[\"'\''']?', r'\\1=***REDACTED***'),
              (r'(?i)(?:mongodb|postgres|mysql|redis|jdbc)://[^\s]+', '***REDACTED_CONNECTION_STRING***'),
              (r'(?i)sk-[A-Za-z0-9]{20,}', 'sk-***REDACTED***'),
              (r'(?i)ghp_[A-Za-z0-9]{20,}', 'ghp_***REDACTED***'),
              (r'(?i)gho_[A-Za-z0-9]{20,}', 'gho_***REDACTED***'),
              (r'(?i)xox[bpras]-[A-Za-z0-9\-]+', '***REDACTED_SLACK_TOKEN***'),
              (r'(?i)AKIA[0-9A-Z]{16}', 'AKIA***REDACTED***'),
          ]
          for pattern, replacement in patterns:
              diff = re.sub(pattern, replacement, diff)
          pathlib.Path('/tmp/pr.diff').write_text(diff)
          print('Diff sanitized before AI review')
          "

      - name: Review with Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, pathlib, subprocess, sys

          api_key = os.environ.get("OPENAI_API_KEY")
          if not api_key:
              print("OPENAI_API_KEY is not set. Skipping review.")
              sys.exit(0)

          pr_number = os.environ.get("PR_NUMBER", "")
          if not pr_number:
              print("PR_NUMBER is not set. Skipping review.")
              sys.exit(0)

          diff = pathlib.Path("/tmp/pr.diff").read_text(errors="replace")

          prompt = (
              "You are a careful code reviewer. Review the following PR diff "
              "and give concise, actionable feedback. Focus on correctness, "
              "security, test coverage, and edge cases. Format as GitHub Markdown.\n\n"
              "```diff\n" + diff + "\n```"
          )

          payload = json.dumps({
              "model": "gpt-4o-mini",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 1024,
              "temperature": 0.2,
          }).encode()

          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {api_key}",
              },
          )
          with urllib.request.urlopen(req, timeout=60) as r:
              data = json.load(r)

          review = data["choices"][0]["message"]["content"]
          body = (
              "### Codex (GPT-4o-mini) review\n\n" + review
              + "\n\n---\n*Automated review via codex-review workflow*"
          )

          subprocess.run(
              ["gh", "pr", "comment",
               pr_number,
               "--repo", os.environ["REPO"],
               "--body", body],
              check=True,
          )
          PYEOF
