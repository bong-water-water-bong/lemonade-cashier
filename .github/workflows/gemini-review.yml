name: gemini-review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (leave empty for PR event)"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: ${{ secrets.GEMINI_API_KEY != "" }}
    name: Gemini Flash PR review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.inputs.pr_number || github.event.pull_request.number }}"
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number provided. This workflow requires either:"
            echo "  - A pull_request event, or"
            echo "  - A pr_number input via workflow_dispatch"
            exit 0
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

      - name: Collect diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cap at 50 KB — Gemini Flash has a 1 M-token context but PR diffs
          # this large are rarely useful in a review comment.
          gh pr diff "$PR_NUMBER" --repo "$REPO" | head -c 51200 > /tmp/pr.diff

      - name: Sanitize diff (strip secrets-like patterns before AI review)
        run: |
          python3 -c "
          import re, pathlib
          diff = pathlib.Path('/tmp/pr.diff').read_text(errors='replace')
          patterns = [
              (r'(?i)(api[_-]?key|secret|token|password|auth[_-]?token|access[_-]?key)\s*[:=]\s*[\"'\''']?[A-Za-z0-9+/=_\-.]{8,}[\"'\''']?', r'\\1=***REDACTED***'),
              (r'(?i)(?:mongodb|postgres|mysql|redis|jdbc)://[^\s]+', '***REDACTED_CONNECTION_STRING***'),
              (r'(?i)sk-[A-Za-z0-9]{20,}', 'sk-***REDACTED***'),
              (r'(?i)ghp_[A-Za-z0-9]{20,}', 'ghp_***REDACTED***'),
              (r'(?i)AKIA[0-9A-Z]{16}', 'AKIA***REDACTED***'),
          ]
          for pattern, replacement in patterns:
              diff = re.sub(pattern, replacement, diff)
          pathlib.Path('/tmp/pr.diff').write_text(diff)
          print('Diff sanitized before AI review')
          "

      - name: Review with Gemini Flash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, pathlib, subprocess, sys

          api_key = os.environ.get("GEMINI_API_KEY")
          if not api_key:
              print("GEMINI_API_KEY is not set. Skipping review.")
              sys.exit(0)

          diff = pathlib.Path("/tmp/pr.diff").read_text(errors="replace")

          prompt = (
              "You are a careful code reviewer. Review the following pull request diff "
              "and give concise, actionable feedback. Focus on correctness, security, "
              "test coverage, and edge cases. If there are no significant issues, say "
              "so briefly. Format your response as GitHub Markdown.\n\n"
              "```diff\n" + diff + "\n```"
          )

          payload = json.dumps({
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"temperature": 0.2, "maxOutputTokens": 1024}
          }).encode()

          url = (
              "https://generativelanguage.googleapis.com/v1beta/models/"
              "gemini-2.0-flash:generateContent?key=" + api_key
          )
          req = urllib.request.Request(
              url, data=payload, headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req, timeout=120) as r:
              data = json.load(r)

          review = data["candidates"][0]["content"]["parts"][0]["text"]

          body = (
              "### Gemini Flash review\n\n"
              + review
              + "\n\n---\n"
              "*Automated review via gemini-review workflow*"
          )

          pr = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]
          subprocess.run(
              ["gh", "pr", "comment", pr, "--repo", repo, "--body", body],
              check=True,
          )
          PYEOF
