name: qodo-merge
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  qodo-merge:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Qodo Merge Review
        uses: qodo-ai/pr-agent@main
        env:
          QODO_API_KEY: ${{ secrets.QODO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
