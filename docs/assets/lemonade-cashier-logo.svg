<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="480" viewBox="0 0 1440 480" role="img" aria-labelledby="title desc">
  <title id="title">Lemonade Cashier app logo</title>
  <desc id="desc">A lemon cashier beside a point-of-sale dashboard with the slogans CASH is King and Barter is fine, showing cash-only checkout, CIT custody, barcode scan, audit replay, and offline operation.</desc>
  <defs>
