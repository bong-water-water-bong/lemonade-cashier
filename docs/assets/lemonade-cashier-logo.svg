      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#edf7fc"/>
      <stop offset="1" stop-color="#e5f1f8"/>
    </linearGradient>
    <linearGradient id="lemon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff176"/>
      <stop offset="0.45" stop-color="#ffd83d"/>
      <stop offset="1" stop-color="#f5a400"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2530"/>
      <stop offset="1" stop-color="#0c1117"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#102a43" flood-opacity="0.18"/>
    </filter>
